<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Bookmarks</title>
<style>
  :root {
    --primary: #1e40af;
    --accent: #3b82f6;
    --bg: #f1f5f9;
    --card: #ffffff;
    --text: #0f172a;
    --muted: #64748b;
    --border: #e2e8f0;
    --danger: #dc2626;
    --shadow: 0 1px 3px rgba(15, 23, 42, 0.08), 0 4px 12px rgba(15, 23, 42, 0.06);
  }
  :root[data-theme="dark"] {
    --primary: #60a5fa;
    --accent: #3b82f6;
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --border: #334155;
    --danger: #f87171;
    --shadow: 0 1px 3px rgba(0, 0, 0, 0.3), 0 4px 12px rgba(0, 0, 0, 0.25);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.2s, color 0.2s;
  }
  header {
    background: var(--primary);
    color: #fff;
    padding: 1.5rem 1.25rem;
    box-shadow: var(--shadow);
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }
  header h1 { margin: 0; font-size: 1.5rem; }
  .theme-btn {
    background: rgba(255, 255, 255, 0.15);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.3);
    padding: 0.5rem 1rem;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
  }
  .theme-btn:hover { background: rgba(255, 255, 255, 0.25); }
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.5rem 1.25rem;
  }
  .panel {
    background: var(--card);
    border-radius: 12px;
    padding: 1.25rem;
    box-shadow: var(--shadow);
    margin-bottom: 1.25rem;
  }
  .panel h2 {
    margin: 0 0 1rem;
    font-size: 1.1rem;
    color: var(--primary);
  }
  form {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }
  form input, form textarea {
    width: 100%;
    padding: 0.6rem 0.8rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.95rem;
    background: var(--bg);
    color: var(--text);
    font-family: inherit;
  }
  form input:focus, form textarea:focus {
    outline: 2px solid var(--accent);
    outline-offset: -1px;
    border-color: transparent;
  }
  form textarea {
    grid-column: 1 / -1;
    resize: vertical;
    min-height: 70px;
  }
  .form-actions {
    grid-column: 1 / -1;
    display: flex;
    gap: 0.5rem;
  }
  button {
    cursor: pointer;
    font-family: inherit;
  }
  .btn-primary {
    background: var(--primary);
    color: #fff;
    border: none;
    padding: 0.65rem 1.25rem;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 500;
  }
  .btn-primary:hover { background: var(--accent); }
  .btn-secondary {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 0.65rem 1.25rem;
    border-radius: 8px;
    font-size: 0.95rem;
  }
  .btn-secondary:hover { color: var(--text); border-color: var(--muted); }
  .controls {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  #search {
    padding: 0.7rem 1rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 1rem;
    background: var(--bg);
    color: var(--text);
  }
  #search:focus {
    outline: 2px solid var(--accent);
    outline-offset: -1px;
    border-color: transparent;
  }
  .categories {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .cat-btn {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 0.4rem 0.9rem;
    border-radius: 999px;
    font-size: 0.85rem;
  }
  .cat-btn:hover { border-color: var(--accent); }
  .cat-btn.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }
  .card {
    background: var(--card);
    border-radius: 12px;
    padding: 1.1rem;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    border: 1px solid var(--border);
  }
  .card-title {
    margin: 0;
    font-size: 1.05rem;
    font-weight: 600;
  }
  .card-title a {
    color: var(--primary);
    text-decoration: none;
    word-break: break-word;
  }
  .card-title a:hover { text-decoration: underline; }
  .card-url {
    font-size: 0.8rem;
    color: var(--muted);
    word-break: break-all;
  }
  .badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    padding: 0.2rem 0.65rem;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 500;
    align-self: flex-start;
  }
  .card-notes {
    font-size: 0.88rem;
    color: var(--muted);
    margin: 0;
    line-height: 1.4;
  }
  .card-actions {
    display: flex;
    gap: 0.5rem;
    margin-top: auto;
    padding-top: 0.5rem;
    border-top: 1px solid var(--border);
  }
  .card-actions button {
    background: transparent;
    border: 1px solid var(--border);
    padding: 0.35rem 0.75rem;
    border-radius: 6px;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .card-actions .edit:hover { color: var(--accent); border-color: var(--accent); }
  .card-actions .delete:hover { color: var(--danger); border-color: var(--danger); }
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 2rem;
    grid-column: 1 / -1;
  }
  @media (max-width: 600px) {
    form { grid-template-columns: 1fr; }
    .grid { grid-template-columns: 1fr; }
    header h1 { font-size: 1.25rem; }
  }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <h1>My Bookmarks</h1>
    <button class="theme-btn" id="themeBtn" type="button">Dark Mode</button>
  </div>
</header>
<main>
  <section class="panel">
    <h2 id="formTitle">Add Bookmark</h2>
    <form id="bookmarkForm">
      <input type="text" id="title" placeholder="Title" required />
      <input type="url" id="url" placeholder="https://example.com" required />
      <input type="text" id="category" placeholder="Category" required />
      <textarea id="notes" placeholder="Notes (optional)"></textarea>
      <div class="form-actions">
        <button type="submit" class="btn-primary" id="submitBtn">Add Bookmark</button>
        <button type="button" class="btn-secondary" id="cancelBtn" style="display:none;">Cancel</button>
      </div>
    </form>
  </section>

  <section class="panel">
    <div class="controls">
      <input type="text" id="search" placeholder="Search by title or category..." />
      <div class="categories" id="categoryFilters"></div>
    </div>
  </section>

  <section class="grid" id="grid"></section>
</main>

<script>
  const STORAGE_KEY = 'bookmarks_v1';
  const THEME_KEY = 'bookmarks_theme';

  const SEED = [
    { id: crypto.randomUUID(), title: 'MDN Web Docs', url: 'https://developer.mozilla.org', category: 'Dev', notes: 'Web platform reference.' },
    { id: crypto.randomUUID(), title: 'GitHub', url: 'https://github.com', category: 'Dev', notes: 'Code hosting and collaboration.' },
    { id: crypto.randomUUID(), title: 'Hacker News', url: 'https://news.ycombinator.com', category: 'News', notes: 'Tech news and discussion.' },
    { id: crypto.randomUUID(), title: 'freeCodeCamp', url: 'https://www.freecodecamp.org', category: 'Learning', notes: 'Free coding tutorials.' },
    { id: crypto.randomUUID(), title: 'Excalidraw', url: 'https://excalidraw.com', category: 'Tools', notes: 'Hand-drawn style diagrams.' },
    { id: crypto.randomUUID(), title: 'Coolify', url: 'https://coolify.io', category: 'Tools', notes: 'Self-hostable PaaS.' },
  ];

  let bookmarks = loadBookmarks();
  let activeCategory = 'All';
  let searchTerm = '';
  let editingId = null;

  const form = document.getElementById('bookmarkForm');
  const titleInput = document.getElementById('title');
  const urlInput = document.getElementById('url');
  const categoryInput = document.getElementById('category');
  const notesInput = document.getElementById('notes');
  const submitBtn = document.getElementById('submitBtn');
  const cancelBtn = document.getElementById('cancelBtn');
  const formTitle = document.getElementById('formTitle');
  const searchInput = document.getElementById('search');
  const categoryFilters = document.getElementById('categoryFilters');
  const grid = document.getElementById('grid');
  const themeBtn = document.getElementById('themeBtn');

  function loadBookmarks() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(SEED));
      return [...SEED];
    }
    try { return JSON.parse(raw); } catch { return [...SEED]; }
  }

  function saveBookmarks() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(bookmarks));
  }

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    themeBtn.textContent = theme === 'dark' ? 'Light Mode' : 'Dark Mode';
  }

  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme') || 'light';
    const next = current === 'dark' ? 'light' : 'dark';
    localStorage.setItem(THEME_KEY, next);
    applyTheme(next);
  }

  function submitBookmark(e) {
    e.preventDefault();
    try { new URL(urlInput.value); } catch {
      alert('Please enter a valid URL (including https://)');
      return;
    }
    const data = {
      title: titleInput.value.trim(),
      url: urlInput.value.trim(),
      category: categoryInput.value.trim(),
      notes: notesInput.value.trim(),
    };
    if (editingId) {
      const idx = bookmarks.findIndex(b => b.id === editingId);
      if (idx !== -1) bookmarks[idx] = { ...bookmarks[idx], ...data };
      cancelEdit();
    } else {
      bookmarks.unshift({ id: crypto.randomUUID(), ...data });
      form.reset();
    }
    saveBookmarks();
    render();
  }

  function startEdit(id) {
    const b = bookmarks.find(x => x.id === id);
    if (!b) return;
    editingId = id;
    titleInput.value = b.title;
    urlInput.value = b.url;
    categoryInput.value = b.category;
    notesInput.value = b.notes || '';
    submitBtn.textContent = 'Update Bookmark';
    cancelBtn.style.display = 'inline-block';
    formTitle.textContent = 'Edit Bookmark';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function cancelEdit() {
    editingId = null;
    form.reset();
    submitBtn.textContent = 'Add Bookmark';
    cancelBtn.style.display = 'none';
    formTitle.textContent = 'Add Bookmark';
  }

  function deleteBookmark(id) {
    if (!confirm('Delete this bookmark?')) return;
    bookmarks = bookmarks.filter(b => b.id !== id);
    if (editingId === id) cancelEdit();
    saveBookmarks();
    render();
  }

  function setCategoryFilter(cat) {
    activeCategory = cat;
    render();
  }

  function getFiltered() {
    const term = searchTerm.toLowerCase();
    return bookmarks.filter(b => {
      const matchesCat = activeCategory === 'All' || b.category === activeCategory;
      const matchesSearch = !term ||
        b.title.toLowerCase().includes(term) ||
        b.category.toLowerCase().includes(term);
      return matchesCat && matchesSearch;
    });
  }

  function renderCategoryFilters() {
    const cats = ['All', ...new Set(bookmarks.map(b => b.category))];
    categoryFilters.innerHTML = '';
    cats.forEach(cat => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'cat-btn' + (cat === activeCategory ? ' active' : '');
      btn.textContent = cat;
      btn.addEventListener('click', () => setCategoryFilter(cat));
      categoryFilters.appendChild(btn);
    });
  }

  function renderGrid() {
    const items = getFiltered();
    grid.innerHTML = '';
    if (items.length === 0) {
      const empty = document.createElement('p');
      empty.className = 'empty';
      empty.textContent = 'No bookmarks match your filters.';
      grid.appendChild(empty);
      return;
    }
    items.forEach(b => {
      const card = document.createElement('article');
      card.className = 'card';

      const badge = document.createElement('span');
      badge.className = 'badge';
      badge.textContent = b.category;
      card.appendChild(badge);

      const h3 = document.createElement('h3');
      h3.className = 'card-title';
      const a = document.createElement('a');
      a.href = b.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.textContent = b.title;
      h3.appendChild(a);
      card.appendChild(h3);

      const urlEl = document.createElement('div');
      urlEl.className = 'card-url';
      urlEl.textContent = b.url;
      card.appendChild(urlEl);

      if (b.notes) {
        const p = document.createElement('p');
        p.className = 'card-notes';
        p.textContent = b.notes;
        card.appendChild(p);
      }

      const actions = document.createElement('div');
      actions.className = 'card-actions';
      const editBtn = document.createElement('button');
      editBtn.type = 'button';
      editBtn.className = 'edit';
      editBtn.textContent = 'Edit';
      editBtn.addEventListener('click', () => startEdit(b.id));
      const delBtn = document.createElement('button');
      delBtn.type = 'button';
      delBtn.className = 'delete';
      delBtn.textContent = 'Delete';
      delBtn.addEventListener('click', () => deleteBookmark(b.id));
      actions.appendChild(editBtn);
      actions.appendChild(delBtn);
      card.appendChild(actions);

      grid.appendChild(card);
    });
  }

  function render() {
    renderCategoryFilters();
    renderGrid();
  }

  form.addEventListener('submit', submitBookmark);
  cancelBtn.addEventListener('click', cancelEdit);
  searchInput.addEventListener('input', e => { searchTerm = e.target.value; renderGrid(); });
  themeBtn.addEventListener('click', toggleTheme);

  applyTheme(localStorage.getItem(THEME_KEY) || 'light');
  render();
</script>
</body>
</html>
